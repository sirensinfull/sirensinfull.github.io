<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACK HOLE — LATTICE CYMATICS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');
  :root{--m:'JetBrains Mono',monospace;--bg:#020204;--p:#08080e;--b:#181828;--mu:#3a3a55;--t:#7780a0;--br:#b0b8d8;--g:#ffaa40;--s:#50e890;--mt:#4a9eff;--pr:#ff6088}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--t);font-family:var(--m);overflow:hidden;height:100vh}
  canvas{display:block;position:fixed;top:0;left:0}

  .hud{position:fixed;z-index:10;pointer-events:none}
  .hud>*{pointer-events:auto}
  .top{top:8px;left:0;right:0;display:flex;justify-content:center;gap:16px;align-items:center}
  .title{font-size:7px;letter-spacing:3px;text-transform:uppercase;color:#2a2a3a}
  .metric{font-size:6.5px;color:#1e1e2e;letter-spacing:.3px;font-variant-numeric:tabular-nums}

  /* ═══ RIGHT PANEL — PHYSICS ═══ */
  .panel{position:fixed;top:8px;right:8px;z-index:10;width:140px;display:flex;flex-direction:column;gap:2px}
  .prow{display:flex;align-items:center;gap:4px;height:18px}
  .prow label{font-size:6px;text-transform:uppercase;letter-spacing:.6px;color:var(--mu);width:40px;text-align:right;flex-shrink:0}
  .prow input[type=range]{flex:1;-webkit-appearance:none;background:var(--b);height:1.5px;border-radius:1px;outline:none}
  .prow input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:7px;height:7px;background:var(--br);border-radius:50%;cursor:pointer}
  .prow .val{font-size:6px;color:#222;width:22px;text-align:left;font-variant-numeric:tabular-nums}
  .sep{height:1px;background:var(--b);margin:2px 0}
  .tier-btns{display:flex;gap:2px;flex:1}
  .tb{flex:1;height:16px;font-size:6px;letter-spacing:.3px;border:1px solid var(--b);background:var(--p);color:var(--mu);cursor:pointer;font-family:var(--m);border-radius:2px;transition:all .15s}
  .tb:hover{color:var(--t);border-color:var(--mu)} .tb.active{color:var(--g);border-color:var(--g)}

  /* ═══ LEFT PANEL — HOUSES ═══ */
  .houses{position:fixed;top:8px;left:8px;z-index:10;width:172px;display:flex;flex-direction:column;gap:1px}
  .htitle{font-size:6px;letter-spacing:2px;text-transform:uppercase;color:#1e1e2e;margin-bottom:2px;text-align:center}
  .hrow{display:flex;align-items:center;gap:3px;height:22px;padding:2px 4px;border-radius:2px;border:1px solid transparent;transition:border-color .2s}
  .hrow:hover{border-color:#151520}
  .hrow .swatch{width:14px;height:14px;border-radius:2px;cursor:pointer;border:1px solid #222;position:relative;overflow:hidden;flex-shrink:0}
  .hrow .swatch input{position:absolute;inset:-4px;width:22px;height:22px;opacity:0;cursor:pointer}
  .hrow .rng{width:14px;height:14px;border:1px solid #151520;border-radius:2px;background:none;color:#2a2a3a;font-size:7px;cursor:pointer;font-family:var(--m);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;padding:0}
  .hrow .rng:hover{color:var(--g);border-color:var(--g)}
  .hrow .hlabel{font-size:6.5px;color:var(--mu);width:18px;text-align:center;flex-shrink:0;font-weight:600}
  .hrow .hprime{font-size:5.5px;color:#1e1e2e;width:12px;flex-shrink:0}
  .hrow .aslider{flex:1;-webkit-appearance:none;background:var(--b);height:1.5px;border-radius:1px;outline:none;min-width:20px}
  .hrow .aslider::-webkit-slider-thumb{-webkit-appearance:none;width:6px;height:6px;border-radius:50%;cursor:pointer}
  .hrow .aval{font-size:5.5px;color:#1e1e2e;width:14px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
  .hrow .band-meter{width:16px;height:10px;border-radius:1px;background:#0a0a12;overflow:hidden;flex-shrink:0;position:relative}
  .hrow .band-fill{height:100%;width:0%;transition:width 50ms;position:absolute;bottom:0;left:0;border-radius:1px}
  .hsep{height:1px;background:#0c0c14;margin:1px 0}
  .hemit-row{display:flex;align-items:center;gap:4px;height:18px;margin-top:2px;padding:0 4px}
  .hemit-row label{font-size:6px;text-transform:uppercase;letter-spacing:.6px;color:var(--mu);width:36px;text-align:right;flex-shrink:0}
  .hemit-row input[type=range]{flex:1;-webkit-appearance:none;background:var(--b);height:1.5px;border-radius:1px;outline:none}
  .hemit-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:7px;height:7px;background:var(--br);border-radius:50%;cursor:pointer}
  .hemit-row .val{font-size:6px;color:#222;width:18px;text-align:left}

  /* ═══ BOTTOM BAR — AUDIO ═══ */
  .bar{position:fixed;bottom:0;left:0;right:0;z-index:10;background:linear-gradient(transparent,#000c 30%,#000e);padding:8px 12px 10px;display:flex;align-items:center;gap:6px}
  .drop-zone{flex-shrink:0;width:30px;height:30px;border:1px dashed var(--b);border-radius:3px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:all .2s}
  .drop-zone:hover{border-color:var(--g)} .drop-zone.active{border-color:var(--g);border-style:solid}
  .drop-zone svg{width:14px;height:14px;fill:var(--mu)} .drop-zone.active svg{fill:var(--g)}
  .drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
  .abtn{width:24px;height:24px;border:1px solid var(--b);border-radius:3px;background:var(--p);color:var(--mu);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--m);transition:all .15s;flex-shrink:0}
  .abtn:hover{color:var(--br);border-color:var(--mu)} .abtn.active{color:var(--g);border-color:var(--g)}
  .track-info{flex:1;min-width:0}
  .track-name{font-size:7px;color:var(--br);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .track-time{font-size:6px;color:var(--mu)}
  .progress-bar{flex:2;height:2px;background:var(--b);border-radius:1px;cursor:pointer;position:relative;min-width:40px}
  .progress-fill{height:100%;background:var(--g);border-radius:1px;width:0%}
  .circ-btn{width:24px;height:24px;border:1px solid var(--b);border-radius:50%;background:var(--p);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
  .circ-btn:hover{border-color:var(--pr)} .circ-btn.active{border-color:var(--pr);background:#ff608810}
  .circ-btn svg{width:11px;height:11px;fill:var(--mu)} .circ-btn.active svg{fill:var(--pr)}
  .circ-btn.sys:hover{border-color:var(--s)} .circ-btn.sys.active{border-color:var(--s);background:#50e89010;animation:sp 2s infinite}
  .circ-btn.sys.active svg{fill:var(--s)}
  @keyframes sp{0%,100%{box-shadow:0 0 0 0 #50e89030}50%{box-shadow:0 0 6px 2px #50e89018}}
  .stats{position:fixed;bottom:50px;left:10px;z-index:10;font-size:6.5px;color:#1a1a28;line-height:1.5}
  .stats b{color:#2a2a3a}
  .birth-flash{position:fixed;inset:0;background:radial-gradient(circle,#fff2 0%,transparent 60%);opacity:0;pointer-events:none;z-index:5;transition:opacity .3s}
  .prng{width:14px;height:14px;border:1px solid #151520;border-radius:2px;background:none;color:#2a2a3a;font-size:7px;cursor:pointer;font-family:var(--m);display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;transition:all .15s}
  .prng:hover{color:var(--g);border-color:var(--g)}
  .lcbtn{width:100%;height:20px;border:1px solid var(--b);background:var(--p);color:var(--mu);font-size:6.5px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:var(--m);border-radius:2px;transition:all .15s;margin-top:2px}
  .lcbtn:hover{color:var(--g);border-color:var(--g)}
  .lcbtn.active{color:#000;background:var(--g);border-color:var(--g)}
  .age-label{font-size:6px;color:var(--mu);text-align:center;margin-top:2px;letter-spacing:.5px}
</style>
</head>
<body>
<div class="birth-flash" id="birthFlash"></div>
<div class="hud top">
  <span class="title">BLACK HOLE — LATTICE CYMATICS</span>
  <span class="metric" id="metric"></span>
</div>

<!-- LEFT — 7 HOUSES -->
<div class="houses" id="housesPanel"></div>

<!-- RIGHT — PHYSICS + LIFECYCLE -->
<div class="panel">
  <div class="prow"><label>tier</label>
    <div class="tier-btns">
      <button class="tb" onclick="setTier(0)">100</button>
      <button class="tb active" onclick="setTier(1)">1k</button>
      <button class="tb" onclick="setTier(2)">5k</button>
      <button class="tb" onclick="setTier(3)">20k</button>
      <button class="tb" onclick="setTier(4)">50k</button>
    </div>
  </div>
  <div class="sep"></div>
  <div class="prow"><label>gravity</label><input type="range" id="sGrav" min="0" max="100" value="55" oninput="V.val(this)"><span class="val" id="vGrav">55</span><button class="prng" onclick="V.rng('sGrav',0,100)">&#x2684;</button></div>
  <div class="prow"><label>size</label><input type="range" id="sSize" min="5" max="100" value="45" oninput="V.val(this)"><span class="val" id="vSize">45</span><button class="prng" onclick="V.rng('sSize',5,100)">&#x2684;</button></div>
  <div class="prow"><label>twinkle</label><input type="range" id="sTwinkle" min="0" max="100" value="50" oninput="V.val(this)"><span class="val" id="vTwinkle">50</span><button class="prng" onclick="V.rng('sTwinkle',0,100)">&#x2684;</button></div>
  <div class="prow"><label>react</label><input type="range" id="sReact" min="0" max="100" value="60" oninput="V.val(this)"><span class="val" id="vReact">60</span><button class="prng" onclick="V.rng('sReact',0,100)">&#x2684;</button></div>
  <div class="prow"><label>dissip</label><input type="range" id="sDissip" min="0" max="100" value="30" oninput="V.val(this)"><span class="val" id="vDissip">30</span><button class="prng" onclick="V.rng('sDissip',0,100)">&#x2684;</button></div>
  <div class="prow"><label>birth</label><input type="range" id="sBirth" min="0" max="100" value="70" oninput="V.val(this)"><span class="val" id="vBirth">70</span><button class="prng" onclick="V.rng('sBirth',0,100)">&#x2684;</button></div>
  <div class="prow"><label>radius</label><input type="range" id="sRadius" min="10" max="100" value="50" oninput="V.val(this)"><span class="val" id="vRadius">50</span><button class="prng" onclick="V.rng('sRadius',10,100)">&#x2684;</button></div>
  <div class="sep"></div>
  <div class="prow"><label>twist</label><input type="range" id="sTwist" min="0" max="100" value="40" oninput="V.val(this)"><span class="val" id="vTwist">40</span><button class="prng" onclick="V.rng('sTwist',0,100)">&#x2684;</button></div>
  <div class="prow"><label>spin</label><input type="range" id="sSpin" min="-100" max="100" value="60" oninput="V.val(this)"><span class="val" id="vSpin">60</span><button class="prng" onclick="V.rng('sSpin',-100,100)">&#x2684;</button></div>
  <div class="sep"></div>
  <button class="prng" onclick="V.rngAll()" style="width:100%;height:16px;font-size:6px;letter-spacing:1px">&#x2684; RANDOMIZE ALL</button>
  <div class="sep"></div>
  <div class="prow"><label>cycle</label><input type="range" id="sCycle" min="10" max="120" value="30" oninput="document.getElementById('vCycle').textContent=this.value+'s'"><span class="val" id="vCycle">30s</span></div>
  <button class="lcbtn" id="lcBtn" onclick="LC.toggle()">&#9854; SCREENSAVER</button>
  <div class="age-label" id="lcAge"></div>
</div>

<div class="stats" id="statsEl"></div>

<!-- AUDIO BAR -->
<div class="bar">
  <div class="drop-zone" id="dropZone">
    <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
    <input type="file" accept="audio/*" onchange="A.loadFile(this.files[0])">
  </div>
  <button class="abtn" id="playBtn" onclick="A.toggle()">&#9654;</button>
  <div class="track-info">
    <div class="track-name" id="trackName">drop audio · mic · or system capture</div>
    <div class="track-time" id="trackTime">—</div>
  </div>
  <div class="progress-bar" id="progressBar" onclick="A.seek(event)">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="circ-btn" id="micBtn" onclick="A.toggleMic()" title="Microphone">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </div>
  <div class="circ-btn sys" id="sysBtn" onclick="A.toggleSys()" title="System audio">
    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ╔═══════════════════════════════════════════╗
// ║  AUDIO ENGINE                             ║
// ╚═══════════════════════════════════════════╝
const A={ctx:null,analyser:null,source:null,el:null,micStream:null,sysStream:null,freq:null,time:null,playing:false,mic:false,sys:false,
  init(){if(this.ctx)return;this.ctx=new(window.AudioContext||window.webkitAudioContext)();this.analyser=this.ctx.createAnalyser();this.analyser.fftSize=2048;this.analyser.smoothingTimeConstant=0.82;this.analyser.connect(this.ctx.destination);this.freq=new Uint8Array(this.analyser.frequencyBinCount);this.time=new Uint8Array(this.analyser.fftSize);},
  killSource(){if(this.source){try{this.source.disconnect()}catch(e){} this.source=null}if(this.micStream){this.micStream.getTracks().forEach(t=>t.stop());this.micStream=null}if(this.sysStream){this.sysStream.getTracks().forEach(t=>t.stop());this.sysStream=null}this.mic=false;this.sys=false;document.getElementById('micBtn').classList.remove('active');document.getElementById('sysBtn').classList.remove('active');},
  loadFile(file){if(!file)return;this.init();this.killSource();if(this.el)this.el.pause();this.el=new Audio();this.el.src=URL.createObjectURL(file);this.el.crossOrigin="anonymous";this.el.addEventListener('canplay',()=>{this.source=this.ctx.createMediaElementSource(this.el);this.source.connect(this.analyser);document.getElementById('trackName').textContent=file.name;document.getElementById('dropZone').classList.add('active');this.toggle()},{once:true});this.el.addEventListener('timeupdate',()=>this.updateProgress());this.el.addEventListener('ended',()=>{this.playing=false;document.getElementById('playBtn').innerHTML='&#9654;'});},
  toggle(){if(!this.el)return;this.init();if(this.ctx.state==='suspended')this.ctx.resume();if(this.playing){this.el.pause();this.playing=false;document.getElementById('playBtn').innerHTML='&#9654;'}else{this.el.play();this.playing=true;document.getElementById('playBtn').innerHTML='&#9646;&#9646;';document.getElementById('playBtn').classList.add('active')}},
  toggleMic(){this.init();if(this.mic){this.killSource();document.getElementById('trackName').textContent='mic off';return}this.killSource();navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{this.micStream=stream;this.source=this.ctx.createMediaStreamSource(stream);const g=this.ctx.createGain();g.gain.value=0;g.connect(this.ctx.destination);this.source.connect(this.analyser);this.analyser.connect(g);this.mic=true;this.playing=true;document.getElementById('micBtn').classList.add('active');document.getElementById('trackName').textContent='\u{1F3A4} microphone'}).catch(()=>{document.getElementById('trackName').textContent='mic denied'})},
  toggleSys(){this.init();if(this.sys){this.killSource();document.getElementById('trackName').textContent='system off';return}this.killSource();navigator.mediaDevices.getDisplayMedia({video:{width:1,height:1,frameRate:1},audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false,sampleRate:48000}}).then(stream=>{this.sysStream=stream;stream.getVideoTracks().forEach(t=>t.stop());const at=stream.getAudioTracks();if(at.length===0){document.getElementById('trackName').textContent='no audio — share a tab';stream.getTracks().forEach(t=>t.stop());return}this.source=this.ctx.createMediaStreamSource(new MediaStream(at));this.source.connect(this.analyser);this.analyser.connect(this.ctx.destination);this.sys=true;this.playing=true;document.getElementById('sysBtn').classList.add('active');document.getElementById('trackName').textContent='\u{1F50A} system audio — vibing';at[0].addEventListener('ended',()=>{this.sys=false;this.playing=false;document.getElementById('sysBtn').classList.remove('active');document.getElementById('trackName').textContent='share ended'})}).catch(err=>{document.getElementById('trackName').textContent=err.name==='NotAllowedError'?'cancelled':'not supported — try Chrome tab share'})},
  updateProgress(){if(!this.el)return;document.getElementById('progressFill').style.width=(this.el.currentTime/this.el.duration*100)+'%';const f=t=>Math.floor(t/60)+':'+String(Math.floor(t%60)).padStart(2,'0');document.getElementById('trackTime').textContent=f(this.el.currentTime)+' / '+f(this.el.duration||0)},
  seek(e){if(this.el)this.el.currentTime=((e.clientX-e.target.getBoundingClientRect().left)/e.target.offsetWidth)*this.el.duration},
  get live(){return this.playing||this.mic||this.sys}
};
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('audio/'))A.loadFile(f)});

// ╔═══════════════════════════════════════════╗
// ║  7 HOUSES — FAMILY PRIME DYNASTIES        ║
// ╚═══════════════════════════════════════════╝
const FAMILY_PRIMES=[2,3,5,7,11,13,23];
const HOUSE_NAMES=['II','III','V','VII','XI','XIII','XXIII'];
const STANDING_HZ=[1,2,3,4,5,6,7]; // per-house emission base frequency

const DEFAULT_HUES=[
  [0.31,0.91,0.56],[1.00,0.67,0.25],[0.29,0.62,1.00],[1.00,0.38,0.53],
  [0.63,0.47,1.00],[1.00,0.86,0.39],[0.39,1.00,0.86]
];

const houses=[];
for(let h=0;h<7;h++){
  houses.push({
    prime:FAMILY_PRIMES[h],
    r:DEFAULT_HUES[h][0],g:DEFAULT_HUES[h][1],b:DEFAULT_HUES[h][2],
    alpha:1.0,
    standingHz:STANDING_HZ[h],
    bandOffset:h // rotated band mapping
  });
}

function rgbToHex(r,g,b){return'#'+[r,g,b].map(v=>Math.round(v*255).toString(16).padStart(2,'0')).join('')}
function hexToRgb(hex){return[parseInt(hex.slice(1,3),16)/255,parseInt(hex.slice(3,5),16)/255,parseInt(hex.slice(5,7),16)/255]}
function randomHue(){const h=Math.random(),s=0.6+Math.random()*0.4,l=0.4+Math.random()*0.3;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h*12)%12;return l-a*Math.max(-1,Math.min(k-3,9-k,1))};return[f(0),f(8),f(4)]}

function buildHousePanel(){
  const panel=document.getElementById('housesPanel');
  let html='<div class="htitle">houses</div>';
  for(let h=0;h<7;h++){
    const ho=houses[h]; const hex=rgbToHex(ho.r,ho.g,ho.b);
    html+=`<div class="hrow" id="hrow${h}">
      <div class="swatch" id="hsw${h}" style="background:${hex}"><input type="color" value="${hex}" onchange="H.setColor(${h},this.value)"></div>
      <button class="rng" onclick="H.rng(${h})" title="random">&#x2684;</button>
      <span class="hlabel">${HOUSE_NAMES[h]}</span>
      <span class="hprime">${ho.standingHz}hz</span>
      <input type="range" class="aslider" id="ha${h}" min="0" max="100" value="100" oninput="H.setAlpha(${h},+this.value)">
      <span class="aval" id="hav${h}">1.0</span>
      <div class="band-meter"><div class="band-fill" id="hbf${h}" style="background:${hex}"></div></div>
    </div>`;
  }
  html+='<div class="hsep"></div>';
  html+=`<div class="hemit-row"><label>emit</label><input type="range" id="sEmit" min="0" max="100" value="50" oninput="document.getElementById('vEmit').textContent=this.value"><span class="val" id="vEmit">50</span></div>`;
  panel.innerHTML=html;
}

const H={
  setColor(h,hex){const[r,g,b]=hexToRgb(hex);houses[h].r=r;houses[h].g=g;houses[h].b=b;
    document.getElementById('hsw'+h).style.background=hex;document.getElementById('hbf'+h).style.background=hex;recolorHouse(h)},
  rng(h){const[r,g,b]=randomHue();houses[h].r=r;houses[h].g=g;houses[h].b=b;
    const hex=rgbToHex(r,g,b);document.getElementById('hsw'+h).style.background=hex;document.getElementById('hbf'+h).style.background=hex;
    document.getElementById('hsw'+h).querySelector('input').value=hex;recolorHouse(h)},
  setAlpha(h,v){houses[h].alpha=v/100;document.getElementById('hav'+h).textContent=(v/100).toFixed(1)}
};

function recolorHouse(h){
  if(!disc.mesh)return;const cols=disc.mesh.instanceColor.array;const ho=houses[h];
  for(let i=0;i<disc.count;i++){const p=disc.particles[i];if(p&&p.band===h){cols[i*3]=ho.r;cols[i*3+1]=ho.g;cols[i*3+2]=ho.b}}
  disc.mesh.instanceColor.needsUpdate=true;
}

const smoothBands=new Float32Array(7);
let totalEnergy=0;

function analyseBands(){
  if(!A.freq)return;const n=A.freq.length,bw=Math.floor(n/7);totalEnergy=0;
  for(let b=0;b<7;b++){let sum=0;for(let i=b*bw;i<(b+1)*bw&&i<n;i++)sum+=A.freq[i]/255;
    const raw=sum/bw;smoothBands[b]=Math.max(raw,smoothBands[b]*0.92);totalEnergy+=smoothBands[b]}
  totalEnergy/=7;
  for(let h=0;h<7;h++){const el=document.getElementById('hbf'+h);if(el)el.style.width=(smoothBands[h]*100)+'%'}
}

  g(id){return parseInt(document.getElementById(id).value)},

const LC={
  active:false,
  timer:null,
  birthTime:0,
  generation:0,

  toggle(){
    this.active=!this.active;
    document.getElementById('lcBtn').classList.toggle('active',this.active);
    if(this.active){this.birth();this.startTimer()}
    else{if(this.timer)clearInterval(this.timer);this.timer=null;document.getElementById('lcAge').textContent=''}
  },

  startTimer(){
    if(this.timer)clearInterval(this.timer);
    const sec=V.g('sCycle');
    this.timer=setInterval(()=>this.birth(),sec*1000);
  },

  birth(){
    this.generation++;
    this.birthTime=performance.now();

    // Randomize EVERYTHING
    V.rngAll();

    // Random tier weighted toward mid-high
    const tierWeights=[0.05,0.2,0.35,0.3,0.1];
    let roll=Math.random(),cum=0,tier=2;
    for(let t=0;t<5;t++){cum+=tierWeights[t];if(roll<cum){tier=t;break}}
    setTier(tier);

    // Random emit
    const emEl=document.getElementById('sEmit');
    if(emEl){emEl.value=30+Math.floor(Math.random()*70);document.getElementById('vEmit').textContent=emEl.value}

    // Birth flash — big one
    const fl=document.getElementById('birthFlash');
    fl.style.opacity=0.4;setTimeout(()=>fl.style.opacity=0,600);

    // Restart cycle timer if interval changed
    this.startTimer();
  },

  updateAge(now){
    if(!this.active)return;
    const ageSec=((now-this.birthTime)/1000);
    let label='';
    if(ageSec<1)label='BIG BANG';
    else if(ageSec<5)label=Math.floor(ageSec*1000)+'k yr';
    else if(ageSec<15)label=Math.floor(ageSec*100)+'M yr';
    else label=((ageSec-15)*0.5+1.5).toFixed(1)+'B yr';
    document.getElementById('lcAge').textContent='gen '+this.generation+' · '+label;
  }
};

function isPrime(n){n=Math.abs(n);if(n<2)return false;if(n<4)return true;if(n%2===0||n%3===0)return false;for(let i=5;i*i<=n;i+=6)if(n%i===0||n%(i+2)===0)return false;return true}

let disc={mesh:null,max:1000,count:0,particles:[],clusters:[],clusterTimer:0,ejectQueue:[],totalBurps:0,totalBounces:0,ehRadius:2.0};
const _dd=new THREE.Object3D();

function rebuildDisc(){
  if(disc.mesh){scene.remove(disc.mesh);disc.mesh=null}
  disc.max=TIERS[currentTier];disc.count=0;disc.particles=[];disc.clusters=[];disc.ejectQueue=[];disc.totalBurps=0;disc.totalBounces=0;
  const det=disc.max<=1000?[5,4]:disc.max<=5000?[4,3]:disc.max<=20000?[3,2]:[2,2];
  const bR=disc.max<=1000?0.3:disc.max<=5000?0.22:disc.max<=20000?0.15:0.1;
  const mesh=new THREE.InstancedMesh(new THREE.SphereGeometry(bR,det[0],det[1]),new THREE.MeshBasicMaterial({transparent:true,opacity:1.0,depthWrite:false}),disc.max);
  mesh.frustumCulled=false;_dd.scale.setScalar(0);_dd.updateMatrix();
  for(let i=0;i<disc.max;i++)mesh.setMatrixAt(i,_dd.matrix);mesh.instanceMatrix.needsUpdate=true;
  mesh.instanceColor=new THREE.InstancedBufferAttribute(new Float32Array(disc.max*3),3);
  scene.add(mesh);disc.mesh=mesh;
}

function birthParticle(){
  if(!disc.mesh||disc.count>=disc.max)return;
  const slot=disc.count,maxR=V.g('sRadius'),r=maxR*0.6+Math.random()*maxR*0.4,angle=Math.random()*Math.PI*2,GM=getGM();
  const cO=GM>0?Math.sqrt(GM/(r*r*r)):0.1;
  const band=Math.floor(Math.random()*7),positive=Math.random()>0.5;
  disc.particles[slot]={angle,r,vr:(Math.random()-0.5)*0.03,vTheta:(V.g('sSpin')>=0?1:-1)*cO*(0.82+Math.random()*0.15),mobiusPhase:angle,positive,band,age:0,clusterId:-1};
  const ho=houses[band],cols=disc.mesh.instanceColor.array;
  cols[slot*3]=ho.r;cols[slot*3+1]=ho.g;cols[slot*3+2]=ho.b;
  disc.count++;disc.mesh.instanceColor.needsUpdate=true;
}

function getGM(){return V.g('sGrav')*V.g('sGrav')*0.005+totalEnergy*V.g('sReact')*0.01*15}

// ╔═══════════════════════════════════════════════════════════╗
// ║  PER-HOUSE BAND ROTATION                                  ║
// ║  Each house reads all 7 bands but from a rotated offset:  ║
// ║    velocity  = band[(h+0)%7]                              ║
// ║    amplitude = band[(h+1)%7]                              ║
// ║    pulse     = band[(h+2)%7]                              ║
// ║    gravity   = band[(h+3)%7]                              ║
// ║    push      = band[(h+4)%7]                              ║
// ║    pull      = band[(h+5)%7]                              ║
// ║    spin      = band[(h+6)%7]                              ║
// ╚═══════════════════════════════════════════════════════════╝

// ╔═══════════════════════════════════════════╗
// ║  PHYSICS                                  ║
// ╚═══════════════════════════════════════════╝
function physicsStep(time){
  if(!disc.mesh||disc.count===0)return;
  const GM=getGM();
  const baseEps=V.g('sDissip')*0.0001;
  const audioEps=smoothBands[1]*V.g('sReact')*0.00005;
  const epsilon=baseEps+audioEps;
  const halfTwistH=V.g('sTwist')*0.03;
  const reactivity=V.g('sReact')/100;
  const twinkle=V.g('sTwinkle')/100;
  const sizeBase=V.g('sSize')/100;
  const emission=V.g('sEmit')/100;
  const ehPulseR=2.0+smoothBands[0]*reactivity*6+totalEnergy*reactivity*3;
  const ehBounce=0.15+totalEnergy*reactivity*0.8+smoothBands[0]*reactivity*0.5;
  disc.ehRadius=ehPulseR;
  const escapeR=V.g('sRadius')*1.3+10;
  const dt=0.12,soft=0.5;
  const active=Math.min(disc.count,disc.max);
  const cols=disc.mesh.instanceColor.array;
  const tSec=time*0.001;

  // Pre-compute per-house standing wave
  const sw=[];
  for(let h=0;h<7;h++) sw.push(Math.sin(tSec*Math.PI*2*houses[h].standingHz));

  // Pre-compute per-house rotated band responses
  const HR=[];
  for(let h=0;h<7;h++){
    const o=h;
    HR.push({
      velocity:  smoothBands[(o+0)%7],
      amplitude: smoothBands[(o+1)%7],
      pulse:     smoothBands[(o+2)%7],
      gravity:   smoothBands[(o+3)%7],
      push:      smoothBands[(o+4)%7],
      pull:      smoothBands[(o+5)%7],
      spin:      smoothBands[(o+6)%7]
    });
  }

  // Cluster detection
  disc.clusterTimer++;
  if(disc.clusterTimer%30===0&&active>10){
    const aBins=24,rBins=8,rMax=escapeR;
    const hash=new Array(aBins*rBins);for(let b=0;b<hash.length;b++)hash[b]=[];
    for(let i=0;i<active;i++){const p=disc.particles[i];if(!p)continue;p.clusterId=-1;
      const ai=Math.floor(((p.angle%(Math.PI*2))+Math.PI*2)%(Math.PI*2)/(Math.PI*2)*aBins)%aBins;
      const ri=Math.min(rBins-1,Math.floor(p.r/rMax*rBins));hash[ai*rBins+ri].push(i)}
    const clusters=[];
    for(let b=0;b<hash.length;b++){if(hash[b].length<3)continue;const cell=hash[b];
      let posC=0,negC=0;for(const idx of cell){if(disc.particles[idx].positive)posC++;else negC++}
      if(posC===0||negC===0)continue;
      let res=0;const cLen=Math.min(cell.length,12);
      for(let j=0;j<cLen-1;j++){const pj=disc.particles[cell[j]];const oj=GM>0?Math.sqrt(GM/Math.max(1,pj.r*pj.r*pj.r)):0.1;
        for(let k=j+1;k<cLen;k++){const pk=disc.particles[cell[k]];const ok=GM>0?Math.sqrt(GM/Math.max(1,pk.r*pk.r*pk.r)):0.1;
          const ratio=oj>0?ok/oj:0;if(Math.min(Math.abs(ratio-1),Math.abs(ratio-2),Math.abs(ratio-0.5),Math.abs(ratio-1.5),Math.abs(ratio-2/3))<0.2)res++}}
      const pairs=Math.min(posC,negC);const mersenne=Math.pow(2,pairs)-1;const stable=isPrime(mersenne)&&pairs>1;
      if(res>=1||stable){const cId=clusters.length;
        const cx=cell.reduce((s,idx)=>s+Math.cos(disc.particles[idx].angle)*disc.particles[idx].r,0)/cell.length;
        const cz=cell.reduce((s,idx)=>s+Math.sin(disc.particles[idx].angle)*disc.particles[idx].r,0)/cell.length;
        clusters.push({id:cId,members:cell.slice(),cx,cz,cr:Math.sqrt(cx*cx+cz*cz),cAngle:Math.atan2(cz,cx),pairs,mersenne,stable,strength:cell.length*0.001*(stable?3:1)});
        for(const idx of cell)disc.particles[idx].clusterId=cId}}
    disc.clusters=clusters;
  }

  const arm1=time*0.0003*(1+smoothBands[0]*3);
  const arm2=time*0.0004*(1+smoothBands[5]*2)+Math.PI;

  // ═══ PER-PARTICLE ═══
  for(let i=0;i<active;i++){
    const p=disc.particles[i];
    if(!p){_dd.scale.setScalar(0);_dd.updateMatrix();disc.mesh.setMatrixAt(i,_dd.matrix);continue}

    const ho=houses[p.band];
    const hr=HR[p.band];
    const standW=sw[p.band];

    // Hidden house: still simulate, don't render
    if(ho.alpha<=0.01){
      _dd.scale.setScalar(0);_dd.updateMatrix();disc.mesh.setMatrixAt(i,_dd.matrix);p.age++;
      let L=p.r*p.r*p.vTheta;L*=(1-epsilon);const grav=-GM/(p.r*p.r+soft);
      p.vr+=(grav+L*L/((p.r*p.r+soft)*p.r||1))*dt;p.vr*=0.9992;p.r+=p.vr*dt;
      if(p.r>0.1)p.vTheta=L/(p.r*p.r);p.angle+=p.vTheta*dt;
      if(p.r<ehPulseR){p.r=ehPulseR+0.05;p.vr=Math.abs(p.vr)*0.3+ehBounce}
      if(p.r>escapeR){p.r=15+Math.random()*15;p.vr=-0.01;p.vTheta=Math.sqrt(GM/(p.r*p.r*p.r))*0.7}
      continue;
    }

    p.age++;const r=p.r;
    if(isNaN(r)||isNaN(p.vr)||isNaN(p.vTheta)||isNaN(p.angle)||r<=0){
      p.r=10+Math.random()*15;p.angle=Math.random()*Math.PI*2;p.vr=0;
      p.vTheta=Math.sqrt(Math.abs(GM)/(p.r*p.r*p.r)||0.01)*0.9*(Math.random()>0.5?1:-1);p.age=0;continue}
    const r2=r*r+soft,r3=r2*r||1;

    // Angular momentum
    let L=r*r*p.vTheta;
    L*=(1-epsilon);

    // ═══ HOUSE-SPECIFIC PHYSICS ═══
    const hR=reactivity;
    // velocity: scales angular momentum
    L*=(1+hr.velocity*hR*0.8);
    // pull: drains angular momentum
    L*=(1-hr.pull*hR*0.001);
    // spin: tangential torque
    L+=hr.spin*hR*0.05*r;

    // arm perturbation
    L+=Math.cos((p.angle-arm1)*2)*0.08*r*hr.velocity*hR;
    p.vr+=Math.cos((p.angle-arm2)*2)*0.003*hr.amplitude*hR;

    // amplitude: standing-wave-modulated radial oscillation
    p.vr+=standW*hr.amplitude*hR*0.005*r;
    // pulse: periodic radial kick
    p.vr+=standW*hr.pulse*hR*0.003;
    // push: outward force modulated by standing wave
    p.vr+=hr.push*hR*0.02*(0.5+0.5*standW);

    // cluster attraction
    if(disc.clusters.length>0&&(p.clusterId==null||p.clusterId<0)){
      let nd=Infinity,nc=null;const px=Math.cos(p.angle)*r,pz=Math.sin(p.angle)*r;
      for(const c of disc.clusters){const dx=px-c.cx,dz=pz-c.cz,d2=dx*dx+dz*dz;if(d2<nd&&d2>0.5){nd=d2;nc=c}}
      if(nc&&nd<400){const dist=Math.sqrt(nd),str=nc.strength/dist;L+=Math.sin(nc.cAngle-p.angle)*str*r*0.5;p.vr+=(nc.cr-r)*str*0.02}
    }

    // radial EOM with per-house gravity mod
    const gravMod=1+hr.gravity*hR*1.5;
    p.vr+=(-GM*gravMod/r2+L*L/r3)*dt;
    p.vr*=0.9992;p.r+=p.vr*dt;
    if(p.r>0.1)p.vTheta=L/(p.r*p.r);
    p.angle+=p.vTheta*dt;

    // EH interaction
    if(p.r<ehPulseR){
      const wasStable=p.clusterId>=0&&disc.clusters[p.clusterId]&&disc.clusters[p.clusterId].stable;
      if(wasStable){
        const cl=disc.clusters[p.clusterId],eR=15+cl.pairs*3;p.r=eR;p.angle+=Math.PI;
        p.vr=0.08+cl.pairs*0.02+ehBounce*0.5;p.vTheta=Math.sqrt(GM/(p.r*p.r*p.r))*0.9*(p.vTheta>=0?1:-1);
        p.age=0;p.mobiusPhase=p.angle;disc.ejectQueue.push({angle:p.angle,r:eR,spread:cl.pairs*2,ttl:60});disc.totalBurps++;
        cols[i*3]=1;cols[i*3+1]=0.84;cols[i*3+2]=0;
      }else{
        p.r=ehPulseR+0.05;p.vr=Math.abs(p.vr)*0.4+ehBounce+hr.push*hR*0.1;
        p.vTheta+=(Math.random()-0.5)*0.02*(1+totalEnergy*3);
        cols[i*3]=1;cols[i*3+1]=0.7+totalEnergy*0.3;cols[i*3+2]=0.4+totalEnergy*0.2;
        p.clusterId=-1;disc.totalBounces++;
      }
    }else if(p.r>escapeR){
      p.r=15+Math.random()*15;p.vr=-0.01;p.vTheta=Math.sqrt(GM/(p.r*p.r*p.r))*0.7;p.age=0;
    }else if(p.r<ehPulseR*0.5){p.r=ehPulseR+0.1;p.vr=Math.abs(p.vr)+0.05}

    // Position
    const flare=1+p.r*0.02;
    const mY=Math.sin(p.angle*0.5+p.mobiusPhase)*halfTwistH*flare;
    _dd.position.set(Math.cos(p.angle)*p.r,mY,Math.sin(p.angle)*p.r);

    // Scale: house alpha × base × twinkle × age × band × standing emission
    const ageIn=Math.min(1,p.age/20);
    const twkPulse=twinkle>0?(0.6+0.4*Math.abs(Math.cos(p.angle*0.5+time*0.002*(1+p.band*0.3)))):1;
    const bandBoost=1+hr.velocity*reactivity*3;
    const emitWave=1+emission*Math.abs(standW)*0.8;
    const s=sizeBase*twkPulse*ageIn*bandBoost*ho.alpha*emitWave;
    _dd.scale.setScalar(Math.max(0.15,s));

    // Color
    if(p.age>0&&p.age<20){const t=p.age/20;cols[i*3]=1+(ho.r-1)*t;cols[i*3+1]=1+(ho.g-1)*t;cols[i*3+2]=1+(ho.b-1)*t}
    else if(p.age>=20){
      const bright=(0.8+hr.velocity*reactivity*1.5+(p.clusterId>=0?0.4:0))*emitWave;
      cols[i*3]=Math.min(1,ho.r*bright);cols[i*3+1]=Math.min(1,ho.g*bright);cols[i*3+2]=Math.min(1,ho.b*bright);
    }

    _dd.updateMatrix();disc.mesh.setMatrixAt(i,_dd.matrix);
  }

  // Eject queue cleanup
  for(let eq=disc.ejectQueue.length-1;eq>=0;eq--){disc.ejectQueue[eq].ttl--;if(disc.ejectQueue[eq].ttl<=0)disc.ejectQueue.splice(eq,1)}
  // Hide unused
  if(active<disc.max){_dd.scale.setScalar(0);_dd.updateMatrix();for(let i=active;i<disc.max;i++)disc.mesh.setMatrixAt(i,_dd.matrix)}
  disc.mesh.instanceMatrix.needsUpdate=true;disc.mesh.instanceColor.needsUpdate=true;
}

// ╔═══════════════════════════════════════════╗
// ║  MAIN LOOP                                ║
// ╚═══════════════════════════════════════════╝
let lastT=0;
function animate(time){
  requestAnimationFrame(animate);
  const dt=Math.min((time-lastT)/16,3);lastT=time;

  if(A.analyser&&A.live){A.analyser.getByteFrequencyData(A.freq);A.analyser.getByteTimeDomainData(A.time)}
  else if(!A.freq){A.freq=new Uint8Array(1024)}
  if(!A.live){for(let i=0;i<80;i++)A.freq[i]=Math.floor(Math.sin(time*0.0008+i*0.4)*25+35)}
  analyseBands();

  // Birth
  const births=Math.max(0,Math.floor((V.g('sBirth')/100*3+totalEnergy*V.g('sReact')*0.01*8)*dt));
  for(let b=0;b<births;b++)birthParticle();
  if(disc.count>0&&disc.count<20){const fl=document.getElementById('birthFlash');fl.style.opacity=0.15;setTimeout(()=>fl.style.opacity=0,300)}

  physicsStep(time);

  // Core visuals
  const ehR=disc.ehRadius||2.5;
  core.scale.setScalar(ehR*0.7);
  ptLight.intensity=0.4+totalEnergy*4+smoothBands[0]*3;ptLight.color.setHSL(0.06+totalEnergy*0.12,0.85,0.5+totalEnergy*0.3);

  // HUD
  const stC=disc.clusters.filter(c=>c.stable).length;
  document.getElementById('metric').textContent=`p:${disc.count}/${disc.max} · c:${disc.clusters.length}${stC>0?' \u2605'+stC:''} · GM:${getGM().toFixed(1)} · EH:${ehR.toFixed(1)} · E:${(totalEnergy*100).toFixed(0)}%`;
  document.getElementById('statsEl').innerHTML=`<b>particles</b> ${disc.count} · <b>clusters</b> ${disc.clusters.length} · <b>stable</b> ${stC} · <b>bounces</b> ${disc.totalBounces} · <b>burps</b> ${disc.totalBurps}`;
  renderer.render(scene,camera);
  LC.updateAge(time);
}

// ═══ INIT ═══
buildHousePanel();
updateCam();
rebuildDisc();
requestAnimationFrame(animate);
</script>
</body>
