<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LATTICE CYMATICS — Particle Engine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');
  :root {
    --bg: #020204; --panel: #08080e; --border: #181828;
    --muted: #3a3a55; --text: #7780a0; --bright: #b0b8d8;
    --growth: #ffaa40; --stable: #50e890; --mitosis: #4a9eff;
    --prime: #ff6088; --family: #50e890;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; overflow:hidden; height:100vh; }
  canvas#cv { position:fixed; top:0; left:0; width:100%; height:100%; }

  .bar {
    position:fixed; bottom:0; left:0; right:0; z-index:10;
    background: linear-gradient(180deg, transparent, #000000cc 30%, #000000ee);
    padding: 12px 20px 16px; display:flex; align-items:center; gap:10px;
  }

  .drop-zone {
    flex-shrink:0; width:42px; height:42px; border:1px dashed var(--border);
    border-radius:4px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all .2s; position:relative; overflow:hidden;
  }
  .drop-zone:hover { border-color:var(--growth); }
  .drop-zone.active { border-color:var(--growth); border-style:solid; }
  .drop-zone svg { width:18px; height:18px; fill:var(--muted); }
  .drop-zone.active svg { fill:var(--growth); }
  .drop-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; }

  .transport { display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .tbtn {
    width:32px; height:32px; border:1px solid var(--border); border-radius:3px;
    background:var(--panel); color:var(--muted); font-size:14px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono'; transition:all .2s;
  }
  .tbtn:hover { color:var(--bright); border-color:var(--muted); }
  .tbtn.active { color:var(--growth); border-color:var(--growth); }

  .track-info {
    flex:1; min-width:0; display:flex; flex-direction:column; gap:2px;
  }
  .track-name { font-size:9px; color:var(--bright); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .track-time { font-size:8px; color:var(--muted); }

  .progress-bar {
    flex:2; height:3px; background:var(--border); border-radius:2px;
    cursor:pointer; position:relative; min-width:80px;
  }
  .progress-fill { height:100%; background:var(--growth); border-radius:2px; width:0%; transition: width 0.1s linear; }

  .ctrl-group { display:flex; gap:4px; align-items:center; flex-shrink:0; }
  .ctrl-col { display:flex; flex-direction:column; align-items:center; gap:1px; }
  .ctrl-col label { font-size:6px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
  input[type=range] {
    width:60px; -webkit-appearance:none; background:var(--border);
    height:2px; border-radius:1px; outline:none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:8px; height:8px;
    background:var(--bright); border-radius:50%; cursor:pointer;
  }

  .mic-btn {
    width:32px; height:32px; border:1px solid var(--border); border-radius:50%;
    background:var(--panel); cursor:pointer; display:flex; align-items:center;
    justify-content:center; transition:all .2s; flex-shrink:0;
  }
  .mic-btn:hover { border-color:var(--prime); }
  .mic-btn.active { border-color:var(--prime); background:#ff608815; }
  .mic-btn svg { width:14px; height:14px; fill:var(--muted); }
  .mic-btn.active svg { fill:var(--prime); }

  .title {
    position:fixed; top:14px; left:50%; transform:translateX(-50%);
    font-size:8px; letter-spacing:3px; text-transform:uppercase; color:#222; z-index:10;
  }

  .viz-mode {
    position:fixed; top:14px; right:16px; display:flex; gap:3px; z-index:10;
  }
  .vbtn {
    padding:3px 7px; font-size:7px; letter-spacing:.6px; text-transform:uppercase;
    background:none; border:1px solid #151520; color:#2a2a3a; cursor:pointer;
    font-family:'JetBrains Mono'; border-radius:2px; transition:all .2s;
  }
  .vbtn:hover { color:var(--text); border-color:var(--border); }
  .vbtn.active { color:var(--growth); border-color:var(--growth); }

  .seed-info {
    position:fixed; top:14px; left:16px; font-size:7px; letter-spacing:.5px;
    color:#222; z-index:10;
  }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="title">LATTICE CYMATICS</div>
<div class="seed-info" id="seedInfo"></div>

<div class="viz-mode">
  <button class="vbtn active" onclick="setMode(0)">radial</button>
  <button class="vbtn" onclick="setMode(1)">scatter</button>
  <button class="vbtn" onclick="setMode(2)">lattice</button>
  <button class="vbtn" onclick="setMode(3)">spiral</button>
</div>

<div class="bar">
  <div class="drop-zone" id="dropZone">
    <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
    <input type="file" accept="audio/*" onchange="loadFile(this.files[0])">
  </div>

  <div class="transport">
    <button class="tbtn" id="playBtn" onclick="togglePlay()">&#9654;</button>
  </div>

  <div class="track-info">
    <div class="track-name" id="trackName">drop audio or use mic</div>
    <div class="track-time" id="trackTime">0:00 / 0:00</div>
  </div>

  <div class="progress-bar" id="progressBar" onclick="seek(event)">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="ctrl-group">
    <div class="ctrl-col">
      <label>particles</label>
      <input type="range" id="pCount" min="500" max="12000" value="4000" oninput="initParticles()">
    </div>
    <div class="ctrl-col">
      <label>react</label>
      <input type="range" id="reactivity" min="1" max="100" value="50">
    </div>
    <div class="ctrl-col">
      <label>symmetry</label>
      <input type="range" id="symmetry" min="1" max="24" value="7">
    </div>
    <div class="ctrl-col">
      <label>decay</label>
      <input type="range" id="decay" min="1" max="99" value="92">
    </div>
  </div>

  <div class="mic-btn" id="micBtn" onclick="toggleMic()">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </div>
</div>

<script>
// ═══ AUDIO ENGINE ═══
let actx, analyser, source, audioEl, micStream;
let freqData, timeData;
const FFT_SIZE = 2048;
let isPlaying = false, isMic = false;

function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = actx.createAnalyser();
  analyser.fftSize = FFT_SIZE;
  analyser.smoothingTimeConstant = 0.8;
  analyser.connect(actx.destination);
  freqData = new Uint8Array(analyser.frequencyBinCount);
  timeData = new Uint8Array(analyser.fftSize);
}

function loadFile(file) {
  if (!file) return;
  initAudio();
  if (source) { source.disconnect(); }
  if (audioEl) { audioEl.pause(); }
  
  audioEl = new Audio();
  audioEl.src = URL.createObjectURL(file);
  audioEl.crossOrigin = "anonymous";
  
  audioEl.addEventListener('canplay', () => {
    source = actx.createMediaElementSource(audioEl);
    source.connect(analyser);
    document.getElementById('trackName').textContent = file.name;
    document.getElementById('dropZone').classList.add('active');
    togglePlay();
  }, { once: true });
  
  audioEl.addEventListener('timeupdate', updateProgress);
  audioEl.addEventListener('ended', () => {
    isPlaying = false;
    document.getElementById('playBtn').innerHTML = '&#9654;';
  });
}

function togglePlay() {
  if (!audioEl) return;
  initAudio();
  if (actx.state === 'suspended') actx.resume();
  if (isPlaying) {
    audioEl.pause();
    isPlaying = false;
    document.getElementById('playBtn').innerHTML = '&#9654;';
  } else {
    audioEl.play();
    isPlaying = true;
    document.getElementById('playBtn').innerHTML = '&#9646;&#9646;';
    document.getElementById('playBtn').classList.add('active');
  }
}

function toggleMic() {
  initAudio();
  if (isMic) {
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (source) { source.disconnect(); source = null; }
    isMic = false;
    document.getElementById('micBtn').classList.remove('active');
    document.getElementById('trackName').textContent = 'mic off';
    return;
  }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    micStream = stream;
    if (source) source.disconnect();
    source = actx.createMediaStreamSource(stream);
    source.connect(analyser);
    // Don't connect mic to destination (feedback!)
    analyser.disconnect();
    analyser.connect(actx.createGain()); // dummy
    isMic = true;
    isPlaying = true;
    document.getElementById('micBtn').classList.add('active');
    document.getElementById('trackName').textContent = '🎤 microphone';
  }).catch(e => {
    document.getElementById('trackName').textContent = 'mic denied';
  });
}

function updateProgress() {
  if (!audioEl) return;
  const pct = (audioEl.currentTime / audioEl.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  const fmt = t => { const m = Math.floor(t/60); return m + ':' + String(Math.floor(t%60)).padStart(2,'0'); };
  document.getElementById('trackTime').textContent = fmt(audioEl.currentTime) + ' / ' + fmt(audioEl.duration || 0);
}

function seek(e) {
  if (!audioEl) return;
  const rect = e.target.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audioEl.currentTime = pct * audioEl.duration;
}

// ═══ FRAMEWORK ═══
const FAMILY = new Set([2,3,5,7,11,13,23,47]);
function isPrime(n) {
  if (n < 2) return false;
  if (n < 4) return true;
  if (n%2===0||n%3===0) return false;
  for (let i=5;i*i<=n;i+=6) if (n%i===0||(n%(i+2))===0) return false;
  return true;
}

// Map frequency bins to lattice numbers
// 7 harmonic bands based on family primes
const BANDS = [2,3,5,7,11,13,23];

function getBandEnergy(data) {
  const n = data.length;
  const bands = new Float32Array(BANDS.length);
  const bandWidth = Math.floor(n / BANDS.length);
  for (let b = 0; b < BANDS.length; b++) {
    let sum = 0;
    const start = b * bandWidth;
    const end = Math.min(start + bandWidth, n);
    for (let i = start; i < end; i++) sum += data[i] / 255;
    bands[b] = sum / bandWidth;
  }
  return bands;
}

// ═══ PARTICLES ═══
let particles = [];
let W, H, cx, cy, radius;
let vizMode = 0;

class Particle {
  constructor() {
    this.reset();
    this.band = Math.floor(Math.random() * BANDS.length);
    this.familyPrime = BANDS[this.band];
    this.phase = Math.random() * Math.PI * 2;
    this.orbitR = 0.1 + Math.random() * 0.9;
    this.speed = 0.002 + Math.random() * 0.01;
    this.size = 0.5 + Math.random() * 1.5;
    this.energy = 0;
  }
  reset() {
    this.x = 0; this.y = 0;
    this.homeX = (Math.random() - 0.5) * 2;
    this.homeY = (Math.random() - 0.5) * 2;
  }
}

function initParticles() {
  const count = parseInt(document.getElementById('pCount').value);
  particles = [];
  for (let i = 0; i < count; i++) particles.push(new Particle());
}

// ═══ RENDER ═══
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W * dpr; cv.height = H * dpr;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  cx = W / 2; cy = H / 2;
  radius = Math.min(W, H) * 0.42;
}

function colorForBand(band, energy) {
  const colors = [
    [80, 232, 144],   // 2: family green
    [255, 170, 64],   // 3: growth gold
    [74, 158, 255],   // 5: mitosis blue
    [255, 96, 136],   // 7: prime pink
    [160, 120, 255],  // 11: purple
    [255, 220, 100],  // 13: warm yellow
    [100, 255, 220],  // 23: cyan
  ];
  const c = colors[band] || [200,200,200];
  const a = 0.15 + energy * 0.85;
  return `rgba(${c[0]},${c[1]},${c[2]},${a.toFixed(3)})`;
}

function nodeGlow(band, energy) {
  const colors = [
    [80, 232, 144],
    [255, 170, 64],
    [74, 158, 255],
    [255, 96, 136],
    [160, 120, 255],
    [255, 220, 100],
    [100, 255, 220],
  ];
  const c = colors[band] || [200,200,200];
  return `rgba(${c[0]},${c[1]},${c[2]},${(energy * 0.3).toFixed(3)})`;
}

let lastTime = 0;
let smoothBands = new Float32Array(BANDS.length);

function render(time) {
  requestAnimationFrame(render);
  const dt = Math.min((time - lastTime) / 16, 3);
  lastTime = time;

  // Get audio data
  if (analyser && (isPlaying || isMic)) {
    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(timeData);
  }

  const bands = getBandEnergy(freqData || new Uint8Array(1024));
  const decayRate = parseInt(document.getElementById('decay').value) / 100;
  for (let i = 0; i < bands.length; i++) {
    smoothBands[i] = Math.max(bands[i], smoothBands[i] * decayRate);
  }

  const reactivity = parseInt(document.getElementById('reactivity').value) / 50;
  const sym = parseInt(document.getElementById('symmetry').value);
  const totalEnergy = smoothBands.reduce((a,b) => a+b, 0) / smoothBands.length;

  // Clear with fade
  ctx.fillStyle = `rgba(2,2,4,${0.08 + (1-decayRate) * 0.4})`;
  ctx.fillRect(0, 0, W, H);

  // Update info
  document.getElementById('seedInfo').textContent = 
    `sym:${sym} | bands: ${BANDS.map((b,i) => b+'='+(smoothBands[i]*100|0)+'%').join(' ')}`;

  // Update & draw particles
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const bandE = smoothBands[p.band] * reactivity;
    p.energy = p.energy * 0.9 + bandE * 0.1;
    p.phase += p.speed * dt * (1 + p.energy * 2);

    let tx, ty;

    if (vizMode === 0) {
      // RADIAL CYMATICS - particles form standing wave patterns
      const r = p.orbitR * radius;
      const angularMode = Math.cos(sym * p.phase + p.familyPrime * 0.3);
      const radialMode = Math.cos(p.familyPrime * p.orbitR * Math.PI * reactivity + totalEnergy * 5);
      const nodeStrength = angularMode * radialMode;
      
      // Particles migrate toward nodes (high amplitude) or antinodes
      const effectiveR = r * (1 + nodeStrength * bandE * 0.3);
      const angle = p.phase + (p.band / BANDS.length) * Math.PI * 2 / sym;
      
      // Apply symmetry
      const symAngle = Math.floor(angle / (Math.PI * 2 / sym)) * (Math.PI * 2 / sym) 
                       + (angle % (Math.PI * 2 / sym));
      
      tx = cx + Math.cos(symAngle) * effectiveR;
      ty = cy + Math.sin(symAngle) * effectiveR;
      
    } else if (vizMode === 1) {
      // SCATTER - particles explode from center based on frequency
      const angle = p.phase * p.familyPrime;
      const thrust = bandE * radius * 0.8;
      const drift = p.orbitR * radius * 0.3;
      tx = cx + Math.cos(angle) * (drift + thrust);
      ty = cy + Math.sin(angle) * (drift + thrust);
      
    } else if (vizMode === 2) {
      // LATTICE - hexagonal grid perturbed by audio
      const cols = Math.ceil(Math.sqrt(particles.length * W / H));
      const rows = Math.ceil(particles.length / cols);
      const idx = i;
      const col = idx % cols;
      const row = Math.floor(idx / cols);
      const spacing = W / cols;
      const baseX = col * spacing + (row % 2 ? spacing/2 : 0) + spacing/2;
      const baseY = row * spacing * 0.866 + spacing/2;
      
      // Perturb by band frequencies
      const px = Math.sin(baseX * 0.01 * p.familyPrime + totalEnergy * 10) * bandE * 40;
      const py = Math.cos(baseY * 0.01 * p.familyPrime + totalEnergy * 10) * bandE * 40;
      
      tx = baseX + px;
      ty = baseY + py;
      
    } else {
      // SPIRAL - logarithmic spiral driven by audio
      const spiralR = (p.orbitR * 0.5 + totalEnergy * 0.5) * radius;
      const spiralAngle = p.phase * 3 + p.orbitR * Math.PI * 8;
      const growth = Math.log(1 + p.orbitR * bandE * 3);
      tx = cx + Math.cos(spiralAngle) * spiralR * (1 + growth);
      ty = cy + Math.sin(spiralAngle) * spiralR * (1 + growth);
    }

    // Smooth movement
    p.x += (tx - p.x) * (0.05 + p.energy * 0.15) * dt;
    p.y += (ty - p.y) * (0.05 + p.energy * 0.15) * dt;

    // Draw
    const sz = p.size * (1 + p.energy * 3);
    
    // Glow for high energy
    if (p.energy > 0.3) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz * 3, 0, Math.PI * 2);
      ctx.fillStyle = nodeGlow(p.band, p.energy);
      ctx.fill();
    }
    
    ctx.beginPath();
    ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
    ctx.fillStyle = colorForBand(p.band, p.energy);
    ctx.fill();
  }

  // Center glow based on total energy
  if (totalEnergy > 0.05) {
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * totalEnergy);
    grad.addColorStop(0, `rgba(255,255,255,${totalEnergy * 0.04})`);
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }
}

function setMode(m) {
  vizMode = m;
  document.querySelectorAll('.vbtn').forEach((b,i) => b.classList.toggle('active', i === m));
  // Re-scatter particles for lattice mode
  if (m === 2) {
    particles.forEach(p => { p.x = p.homeX * W/2 + cx; p.y = p.homeY * H/2 + cy; });
  }
}

// ═══ DRAG & DROP ═══
document.addEventListener('dragover', e => { e.preventDefault(); });
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('audio/')) loadFile(file);
});

// ═══ INIT ═══
window.addEventListener('resize', resize);
resize();
initParticles();
requestAnimationFrame(render);

// Generate silent audio data for idle animation
freqData = new Uint8Array(1024);
timeData = new Uint8Array(FFT_SIZE);

// Idle shimmer - subtle low-freq content so particles aren't static
setInterval(() => {
  if (!isPlaying && !isMic && freqData) {
    for (let i = 0; i < 20; i++) {
      freqData[i] = Math.floor(Math.sin(Date.now() * 0.001 + i * 0.5) * 15 + 20);
    }
  }
}, 50);
</script>
</body>
</html>
