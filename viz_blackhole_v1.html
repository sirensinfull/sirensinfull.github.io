<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACK HOLE — LATTICE CYMATICS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');
  :root{--m:'JetBrains Mono',monospace;--bg:#020204;--p:#08080e;--b:#181828;--mu:#3a3a55;--t:#7780a0;--br:#b0b8d8;--g:#ffaa40;--s:#50e890;--mt:#4a9eff;--pr:#ff6088}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--t);font-family:var(--m);overflow:hidden;height:100vh}
  canvas{display:block;position:fixed;top:0;left:0}

  /* ═══ HUD ═══ */
  .hud{position:fixed;z-index:10;pointer-events:none}
  .hud>*{pointer-events:auto}
  .top{top:8px;left:0;right:0;display:flex;justify-content:center;gap:16px;align-items:center}
  .title{font-size:7px;letter-spacing:3px;text-transform:uppercase;color:#2a2a3a}
  .metric{font-size:6.5px;color:#1e1e2e;letter-spacing:.3px;font-variant-numeric:tabular-nums}

  /* ═══ RIGHT PANEL — PHYSICS CONTROLS ═══ */
  .panel{position:fixed;top:8px;right:8px;z-index:10;width:140px;display:flex;flex-direction:column;gap:2px}
  .prow{display:flex;align-items:center;gap:4px;height:18px}
  .prow label{font-size:6px;text-transform:uppercase;letter-spacing:.6px;color:var(--mu);width:40px;text-align:right;flex-shrink:0}
  .prow input[type=range]{flex:1;-webkit-appearance:none;background:var(--b);height:1.5px;border-radius:1px;outline:none}
  .prow input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:7px;height:7px;background:var(--br);border-radius:50%;cursor:pointer}
  .prow .val{font-size:6px;color:#222;width:22px;text-align:left;font-variant-numeric:tabular-nums}
  .sep{height:1px;background:var(--b);margin:2px 0}

  /* ═══ TIER SELECTOR ═══ */
  .tier-btns{display:flex;gap:2px;flex:1}
  .tb{flex:1;height:16px;font-size:6px;letter-spacing:.3px;border:1px solid var(--b);background:var(--p);color:var(--mu);cursor:pointer;font-family:var(--m);border-radius:2px;transition:all .15s}
  .tb:hover{color:var(--t);border-color:var(--mu)} .tb.active{color:var(--g);border-color:var(--g)}

  /* ═══ BOTTOM BAR — AUDIO ═══ */
  .bar{position:fixed;bottom:0;left:0;right:0;z-index:10;background:linear-gradient(transparent,#000c 30%,#000e);padding:8px 12px 10px;display:flex;align-items:center;gap:6px}
  .drop-zone{flex-shrink:0;width:30px;height:30px;border:1px dashed var(--b);border-radius:3px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:all .2s}
  .drop-zone:hover{border-color:var(--g)} .drop-zone.active{border-color:var(--g);border-style:solid}
  .drop-zone svg{width:14px;height:14px;fill:var(--mu)} .drop-zone.active svg{fill:var(--g)}
  .drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}

  .abtn{width:24px;height:24px;border:1px solid var(--b);border-radius:3px;background:var(--p);color:var(--mu);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--m);transition:all .15s;flex-shrink:0}
  .abtn:hover{color:var(--br);border-color:var(--mu)} .abtn.active{color:var(--g);border-color:var(--g)}

  .track-info{flex:1;min-width:0}
  .track-name{font-size:7px;color:var(--br);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .track-time{font-size:6px;color:var(--mu)}

  .progress-bar{flex:2;height:2px;background:var(--b);border-radius:1px;cursor:pointer;position:relative;min-width:40px}
  .progress-fill{height:100%;background:var(--g);border-radius:1px;width:0%}

  .circ-btn{width:24px;height:24px;border:1px solid var(--b);border-radius:50%;background:var(--p);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
  .circ-btn:hover{border-color:var(--pr)} .circ-btn.active{border-color:var(--pr);background:#ff608810}
  .circ-btn svg{width:11px;height:11px;fill:var(--mu)} .circ-btn.active svg{fill:var(--pr)}
  .circ-btn.sys:hover{border-color:var(--s)} .circ-btn.sys.active{border-color:var(--s);background:#50e89010;animation:sp 2s infinite}
  .circ-btn.sys.active svg{fill:var(--s)}
  @keyframes sp{0%,100%{box-shadow:0 0 0 0 #50e89030}50%{box-shadow:0 0 6px 2px #50e89018}}

  /* ═══ STATS ═══ */
  .stats{position:fixed;bottom:50px;left:10px;z-index:10;font-size:6.5px;color:#1a1a28;line-height:1.5}
  .stats b{color:#2a2a3a}

  /* ═══ BIRTH FLASH ═══ */
  .birth-flash{position:fixed;inset:0;background:radial-gradient(circle,#fff2 0%,transparent 60%);opacity:0;pointer-events:none;z-index:5;transition:opacity .3s}
</style>
</head>
<body>
<div class="birth-flash" id="birthFlash"></div>

<div class="hud top">
  <span class="title">BLACK HOLE — LATTICE CYMATICS</span>
  <span class="metric" id="metric"></span>
</div>

<!-- PHYSICS CONTROLS -->
<div class="panel">
  <div class="prow"><label>tier</label>
    <div class="tier-btns">
      <button class="tb" onclick="setTier(0)">100</button>
      <button class="tb active" onclick="setTier(1)">1k</button>
      <button class="tb" onclick="setTier(2)">5k</button>
      <button class="tb" onclick="setTier(3)">20k</button>
      <button class="tb" onclick="setTier(4)">50k</button>
    </div>
  </div>
  <div class="sep"></div>
  <div class="prow"><label>gravity</label><input type="range" id="sGrav" min="0" max="100" value="55" oninput="V.val(this)"><span class="val" id="vGrav">55</span></div>
  <div class="prow"><label>size</label><input type="range" id="sSize" min="5" max="100" value="35" oninput="V.val(this)"><span class="val" id="vSize">35</span></div>
  <div class="prow"><label>twinkle</label><input type="range" id="sTwinkle" min="0" max="100" value="50" oninput="V.val(this)"><span class="val" id="vTwinkle">50</span></div>
  <div class="prow"><label>react</label><input type="range" id="sReact" min="0" max="100" value="60" oninput="V.val(this)"><span class="val" id="vReact">60</span></div>
  <div class="prow"><label>dissip</label><input type="range" id="sDissip" min="0" max="100" value="30" oninput="V.val(this)"><span class="val" id="vDissip">30</span></div>
  <div class="prow"><label>birth</label><input type="range" id="sBirth" min="0" max="100" value="70" oninput="V.val(this)"><span class="val" id="vBirth">70</span></div>
  <div class="prow"><label>radius</label><input type="range" id="sRadius" min="10" max="100" value="50" oninput="V.val(this)"><span class="val" id="vRadius">50</span></div>
  <div class="sep"></div>
  <div class="prow"><label>twist</label><input type="range" id="sTwist" min="0" max="100" value="40" oninput="V.val(this)"><span class="val" id="vTwist">40</span></div>
  <div class="prow"><label>spin</label><input type="range" id="sSpin" min="-100" max="100" value="60" oninput="V.val(this)"><span class="val" id="vSpin">60</span></div>
</div>

<div class="stats" id="statsEl">
  <b>particles</b> 0 · <b>clusters</b> 0 · <b>stable</b> 0 · <b>burps</b> 0
</div>

<!-- AUDIO BAR -->
<div class="bar">
  <div class="drop-zone" id="dropZone">
    <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
    <input type="file" accept="audio/*" onchange="A.loadFile(this.files[0])">
  </div>
  <button class="abtn" id="playBtn" onclick="A.toggle()">&#9654;</button>
  <div class="track-info">
    <div class="track-name" id="trackName">drop audio · mic · or system capture</div>
    <div class="track-time" id="trackTime">—</div>
  </div>
  <div class="progress-bar" id="progressBar" onclick="A.seek(event)">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="circ-btn" id="micBtn" onclick="A.toggleMic()" title="Microphone">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </div>
  <div class="circ-btn sys" id="sysBtn" onclick="A.toggleSys()" title="System audio — vibes with everything playing">
    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ╔══════════════════════════════════════════════════════════╗
// ║  AUDIO ENGINE                                            ║
// ╚══════════════════════════════════════════════════════════╝
const A = {
  ctx: null, analyser: null, source: null, el: null,
  micStream: null, sysStream: null,
  freq: null, time: null,
  playing: false, mic: false, sys: false,

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.analyser = this.ctx.createAnalyser();
    this.analyser.fftSize = 2048;
    this.analyser.smoothingTimeConstant = 0.82;
    this.analyser.connect(this.ctx.destination);
    this.freq = new Uint8Array(this.analyser.frequencyBinCount);
    this.time = new Uint8Array(this.analyser.fftSize);
  },

  killSource() {
    if (this.source) { try { this.source.disconnect(); } catch(e){} this.source = null; }
    if (this.micStream) { this.micStream.getTracks().forEach(t=>t.stop()); this.micStream = null; }
    if (this.sysStream) { this.sysStream.getTracks().forEach(t=>t.stop()); this.sysStream = null; }
    this.mic = false; this.sys = false;
    document.getElementById('micBtn').classList.remove('active');
    document.getElementById('sysBtn').classList.remove('active');
  },

  loadFile(file) {
    if (!file) return;
    this.init(); this.killSource();
    if (this.el) this.el.pause();
    this.el = new Audio();
    this.el.src = URL.createObjectURL(file);
    this.el.crossOrigin = "anonymous";
    this.el.addEventListener('canplay', () => {
      this.source = this.ctx.createMediaElementSource(this.el);
      this.source.connect(this.analyser);
      document.getElementById('trackName').textContent = file.name;
      document.getElementById('dropZone').classList.add('active');
      this.toggle();
    }, { once: true });
    this.el.addEventListener('timeupdate', () => this.updateProgress());
    this.el.addEventListener('ended', () => { this.playing = false; document.getElementById('playBtn').innerHTML = '&#9654;'; });
  },

  toggle() {
    if (!this.el) return;
    this.init();
    if (this.ctx.state === 'suspended') this.ctx.resume();
    if (this.playing) { this.el.pause(); this.playing = false; document.getElementById('playBtn').innerHTML = '&#9654;'; }
    else { this.el.play(); this.playing = true; document.getElementById('playBtn').innerHTML = '&#9646;&#9646;'; document.getElementById('playBtn').classList.add('active'); }
  },

  toggleMic() {
    this.init();
    if (this.mic) { this.killSource(); document.getElementById('trackName').textContent = 'mic off'; return; }
    this.killSource();
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      this.micStream = stream;
      this.source = this.ctx.createMediaStreamSource(stream);
      const g = this.ctx.createGain(); g.gain.value = 0; g.connect(this.ctx.destination);
      this.source.connect(this.analyser); this.analyser.connect(g);
      this.mic = true; this.playing = true;
      document.getElementById('micBtn').classList.add('active');
      document.getElementById('trackName').textContent = '\u{1F3A4} microphone';
    }).catch(() => { document.getElementById('trackName').textContent = 'mic denied'; });
  },

  toggleSys() {
    this.init();
    if (this.sys) { this.killSource(); document.getElementById('trackName').textContent = 'system off'; return; }
    this.killSource();
    navigator.mediaDevices.getDisplayMedia({
      video: { width: 1, height: 1, frameRate: 1 },
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, sampleRate: 48000 }
    }).then(stream => {
      this.sysStream = stream;
      stream.getVideoTracks().forEach(t => t.stop());
      const audioTracks = stream.getAudioTracks();
      if (audioTracks.length === 0) {
        document.getElementById('trackName').textContent = 'no audio — share a tab with sound';
        stream.getTracks().forEach(t=>t.stop()); return;
      }
      this.source = this.ctx.createMediaStreamSource(new MediaStream(audioTracks));
      this.source.connect(this.analyser);
      this.analyser.connect(this.ctx.destination);
      this.sys = true; this.playing = true;
      document.getElementById('sysBtn').classList.add('active');
      document.getElementById('trackName').textContent = '\u{1F50A} system audio — vibing';
      audioTracks[0].addEventListener('ended', () => {
        this.sys = false; this.playing = false;
        document.getElementById('sysBtn').classList.remove('active');
        document.getElementById('trackName').textContent = 'share ended';
      });
    }).catch(err => {
      document.getElementById('trackName').textContent = err.name === 'NotAllowedError' ? 'cancelled' : 'not supported — try Chrome tab share';
    });
  },

  updateProgress() {
    if (!this.el) return;
    document.getElementById('progressFill').style.width = (this.el.currentTime / this.el.duration * 100) + '%';
    const f = t => Math.floor(t/60)+':'+String(Math.floor(t%60)).padStart(2,'0');
    document.getElementById('trackTime').textContent = f(this.el.currentTime)+' / '+f(this.el.duration||0);
  },

  seek(e) { if (this.el) this.el.currentTime = ((e.clientX - e.target.getBoundingClientRect().left) / e.target.offsetWidth) * this.el.duration; },

  get live() { return this.playing || this.mic || this.sys; }
};

document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f && f.type.startsWith('audio/')) A.loadFile(f); });

// ╔══════════════════════════════════════════════════════════╗
// ║  AUDIO BAND ANALYSIS — 7 FAMILY-PRIME BANDS              ║
// ╚══════════════════════════════════════════════════════════╝
const BANDS = [2,3,5,7,11,13,23];
const smoothBands = new Float32Array(7);
let totalEnergy = 0;

function analyseBands() {
  if (!A.freq) return;
  const n = A.freq.length;
  const bw = Math.floor(n / 7);
  totalEnergy = 0;
  for (let b = 0; b < 7; b++) {
    let sum = 0;
    for (let i = b * bw; i < (b+1) * bw && i < n; i++) sum += A.freq[i] / 255;
    const raw = sum / bw;
    smoothBands[b] = Math.max(raw, smoothBands[b] * 0.92);
    totalEnergy += smoothBands[b];
  }
  totalEnergy /= 7;
}

// ╔══════════════════════════════════════════════════════════╗
// ║  CONTROLS                                                ║
// ╚══════════════════════════════════════════════════════════╝
const TIERS = [100, 1000, 5000, 20000, 50000];
let currentTier = 1;

const V = {
  val(el) {
    const id = el.id.replace('s','v').replace(/^s/,'v');
    const vEl = document.getElementById('v' + el.id.slice(1));
    if (vEl) vEl.textContent = el.value;
  },
  g(id) { return parseInt(document.getElementById(id).value); }
};

function setTier(t) {
  currentTier = t;
  document.querySelectorAll('.tb').forEach((b,i) => b.classList.toggle('active', i === t));
  rebuildDisc();
}

// ╔══════════════════════════════════════════════════════════╗
// ║  THREE.JS — SCENE                                        ║
// ╚══════════════════════════════════════════════════════════╝
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020204, 0.003);
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.3, 3000);
camera.position.set(0, 40, 80);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x020204);
document.body.appendChild(renderer.domElement);

// Lights
const amb = new THREE.AmbientLight(0x111122, 0.2);
scene.add(amb);
const ptLight = new THREE.PointLight(0xffaa44, 0.1, 300);
ptLight.position.set(0, 0, 0);
scene.add(ptLight);

// ═══ CAMERA (untethered 4-axis) ═══
const cam = {
  rx: 0, ry: 0.35, dist: 80,
  px: 0, py: 0, pz: 0,
  drag: false, shift: false,
  sx: 0, sy: 0, orx: 0, ory: 0, opx: 0, opy: 0
};

function updateCam() {
  const cx = cam.dist * Math.sin(cam.rx) * Math.cos(cam.ry);
  const cy = cam.dist * Math.sin(cam.ry);
  const cz = cam.dist * Math.cos(cam.rx) * Math.cos(cam.ry);
  camera.position.set(cx + cam.px, cy + cam.py, cz + cam.pz);
  camera.lookAt(cam.px, cam.py * 0.3, cam.pz);
}

const cvEl = renderer.domElement;
cvEl.style.cursor = 'grab';
cvEl.addEventListener('mousedown', e => {
  cam.drag = true; cam.shift = e.shiftKey;
  cam.sx = e.clientX; cam.sy = e.clientY;
  cam.orx = cam.rx; cam.ory = cam.ry; cam.opx = cam.px; cam.opy = cam.py;
  cvEl.style.cursor = 'grabbing';
});
cvEl.addEventListener('mousemove', e => {
  if (!cam.drag) return;
  const dx = e.clientX - cam.sx, dy = e.clientY - cam.sy;
  if (cam.shift || e.shiftKey) { cam.px = cam.opx - dx * 0.25; cam.py = cam.opy + dy * 0.25; }
  else { cam.rx = cam.orx + dx * 0.005; cam.ry = Math.max(-1.4, Math.min(1.4, cam.ory + dy * 0.005)); }
  updateCam();
});
cvEl.addEventListener('mouseup', () => { cam.drag = false; cvEl.style.cursor = 'grab'; });
cvEl.addEventListener('wheel', e => { e.preventDefault(); cam.dist = Math.max(3, Math.min(800, cam.dist * (e.deltaY > 0 ? 1.07 : 0.93))); updateCam(); }, { passive: false });
window.addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

// ╔══════════════════════════════════════════════════════════╗
// ║  SINGULARITY CORE — VISUAL                               ║
// ╚══════════════════════════════════════════════════════════╝
// The actual void
const coreGeo = new THREE.SphereGeometry(1.5, 24, 24);
const coreMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// Event horizon wireframe
const ehGeo = new THREE.SphereGeometry(2.5, 20, 20);
const ehMat = new THREE.MeshBasicMaterial({ color: 0x221133, transparent: true, opacity: 0.08, wireframe: true });
const ehMesh = new THREE.Mesh(ehGeo, ehMat);
scene.add(ehMesh);

// Photon sphere
const psGeo = new THREE.TorusGeometry(4, 0.08, 8, 80);
const psMat = new THREE.MeshBasicMaterial({ color: 0xffcc66, transparent: true, opacity: 0.15 });
const psMesh = new THREE.Mesh(psGeo, psMat);
psMesh.rotation.x = Math.PI / 2;
scene.add(psMesh);

// Accretion glow ring (visual only — particles are the real disc)
const glowGeo = new THREE.TorusGeometry(6, 1.5, 6, 64);
const glowMat = new THREE.MeshBasicMaterial({ color: 0xff6622, transparent: true, opacity: 0.04 });
const glowMesh = new THREE.Mesh(glowGeo, glowMat);
glowMesh.rotation.x = Math.PI * 0.48;
scene.add(glowMesh);

// ╔══════════════════════════════════════════════════════════╗
// ║  ACCRETION DISC — REAL PHYSICS (from Synergonesis)       ║
// ╚══════════════════════════════════════════════════════════╝
function isPrime(n) {
  n = Math.abs(n); if (n < 2) return false; if (n < 4) return true;
  if (n%2===0||n%3===0) return false;
  for (let i = 5; i*i <= n; i += 6) if (n%i===0||n%(i+2)===0) return false;
  return true;
}

const BAND_COLORS = [
  [0.31, 0.91, 0.56],  // 2: green
  [1.0, 0.67, 0.25],   // 3: gold
  [0.29, 0.62, 1.0],   // 5: blue
  [1.0, 0.38, 0.53],   // 7: pink
  [0.63, 0.47, 1.0],   // 11: purple
  [1.0, 0.86, 0.39],   // 13: yellow
  [0.39, 1.0, 0.86],   // 23: cyan
];

let disc = {
  mesh: null,
  max: 1000,
  count: 0,
  particles: [],
  clusters: [],
  clusterTimer: 0,
  ejectQueue: [],
  spatialHash: null,
  totalBurps: 0,
  birthQueue: 0 // how many to birth this frame
};

const _dd = new THREE.Object3D();

function rebuildDisc() {
  if (disc.mesh) { scene.remove(disc.mesh); disc.mesh = null; }
  disc.max = TIERS[currentTier];
  disc.count = 0;
  disc.particles = [];
  disc.clusters = [];
  disc.ejectQueue = [];
  disc.totalBurps = 0;

  const detail = disc.max <= 1000 ? [5, 4] : disc.max <= 5000 ? [4, 3] : disc.max <= 20000 ? [3, 2] : [2, 2];
  const baseR = disc.max <= 1000 ? 0.3 : disc.max <= 5000 ? 0.22 : disc.max <= 20000 ? 0.15 : 0.1;
  const geo = new THREE.SphereGeometry(baseR, detail[0], detail[1]);
  const mat = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.85, depthWrite: false });
  const mesh = new THREE.InstancedMesh(geo, mat, disc.max);
  mesh.frustumCulled = false;

  // Init all hidden
  _dd.scale.setScalar(0); _dd.updateMatrix();
  for (let i = 0; i < disc.max; i++) mesh.setMatrixAt(i, _dd.matrix);
  mesh.instanceMatrix.needsUpdate = true;

  // Allocate instance colors
  const colors = new Float32Array(disc.max * 3);
  mesh.instanceColor = new THREE.InstancedBufferAttribute(colors, 3);

  scene.add(mesh);
  disc.mesh = mesh;
}

function birthParticle() {
  if (!disc.mesh || disc.count >= disc.max) return;

  const slot = disc.count;
  const maxR = V.g('sRadius');
  const r = maxR * 0.6 + Math.random() * maxR * 0.4;
  const angle = Math.random() * Math.PI * 2;
  const GM = getGM();

  // Keplerian circular orbit + slight sub-circular → spiral infall
  const circularOmega = GM > 0 ? Math.sqrt(GM / (r * r * r)) : 0.1;
  const spinDir = V.g('sSpin') >= 0 ? 1 : -1;
  const vTheta = spinDir * circularOmega * (0.82 + Math.random() * 0.15);
  const vr = (Math.random() - 0.5) * 0.03;

  // Assign to family-prime band
  const band = Math.floor(Math.random() * 7);
  const positive = Math.random() > 0.5;

  disc.particles[slot] = {
    angle, r, vr, vTheta,
    mobiusPhase: angle,
    positive,
    band,
    age: 0,
    consumed: false,
    clusterId: -1
  };

  // Color by band
  const c = BAND_COLORS[band];
  const cols = disc.mesh.instanceColor.array;
  cols[slot * 3] = c[0];
  cols[slot * 3 + 1] = c[1];
  cols[slot * 3 + 2] = c[2];

  disc.count++;
  disc.mesh.instanceColor.needsUpdate = true;
}

function getGM() {
  const base = V.g('sGrav') * V.g('sGrav') * 0.005; // quadratic: 0→0, 50→12.5, 100→50
  const audioBoost = totalEnergy * V.g('sReact') * 0.01 * 15;
  return base + audioBoost;
}

// ╔══════════════════════════════════════════════════════════╗
// ║  PHYSICS STEP — REAL KEPLERIAN GRAVITY WELL              ║
// ╚══════════════════════════════════════════════════════════╝
function physicsStep(time) {
  if (!disc.mesh || disc.count === 0) return;

  const GM = getGM();
  const baseEpsilon = V.g('sDissip') * 0.0001; // angular momentum dissipation
  const audioEpsilon = smoothBands[1] * V.g('sReact') * 0.00005; // mid-freq drives dissipation
  const epsilon = baseEpsilon + audioEpsilon;
  const consumeR = 2.0;
  const escapeR = V.g('sRadius') * 1.3 + 10;
  const dt = 0.12;
  const softening = 0.5;
  const halfTwistH = V.g('sTwist') * 0.03;
  const reactivity = V.g('sReact') / 100;
  const twinkle = V.g('sTwinkle') / 100;
  const sizeBase = V.g('sSize') / 100;
  const active = Math.min(disc.count, disc.max);

  const cols = disc.mesh.instanceColor.array;

  // ═══ SPATIAL HASH + CLUSTER DETECTION (every 30 frames) ═══
  disc.clusterTimer++;
  if (disc.clusterTimer % 30 === 0 && active > 10) {
    const aBins = 24, rBins = 8, rMax = escapeR;
    const hash = new Array(aBins * rBins);
    for (let b = 0; b < hash.length; b++) hash[b] = [];

    for (let i = 0; i < active; i++) {
      const p = disc.particles[i]; if (!p) continue;
      p.clusterId = -1;
      const ai = Math.floor(((p.angle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2) / (Math.PI*2) * aBins) % aBins;
      const ri = Math.min(rBins-1, Math.floor(p.r / rMax * rBins));
      hash[ai * rBins + ri].push(i);
    }
    disc.spatialHash = hash;

    // Detect clusters: 3+ particles with cross-polarity
    const clusters = [];
    for (let b = 0; b < hash.length; b++) {
      if (hash[b].length < 3) continue;
      const cell = hash[b];
      let posC = 0, negC = 0;
      for (const idx of cell) { if (disc.particles[idx].positive) posC++; else negC++; }
      if (posC === 0 || negC === 0) continue;

      // Resonance check: harmonic orbital rate alignment
      let resonanceScore = 0;
      const cLen = Math.min(cell.length, 12);
      for (let j = 0; j < cLen - 1; j++) {
        const pj = disc.particles[cell[j]];
        const oj = GM > 0 ? Math.sqrt(GM / Math.max(1, pj.r * pj.r * pj.r)) : 0.1;
        for (let k = j + 1; k < cLen; k++) {
          const pk = disc.particles[cell[k]];
          const ok = GM > 0 ? Math.sqrt(GM / Math.max(1, pk.r * pk.r * pk.r)) : 0.1;
          const ratio = oj > 0 ? ok / oj : 0;
          const hd = Math.min(Math.abs(ratio-1), Math.abs(ratio-2), Math.abs(ratio-0.5),
            Math.abs(ratio-1.5), Math.abs(ratio-2/3));
          if (hd < 0.2) resonanceScore++;
        }
      }

      const pairs = Math.min(posC, negC);
      const mersenne = Math.pow(2, pairs) - 1;
      const stable = isPrime(mersenne) && pairs > 1;

      if (resonanceScore >= 1 || stable) {
        const cId = clusters.length;
        const cx = cell.reduce((s, idx) => s + Math.cos(disc.particles[idx].angle) * disc.particles[idx].r, 0) / cell.length;
        const cz = cell.reduce((s, idx) => s + Math.sin(disc.particles[idx].angle) * disc.particles[idx].r, 0) / cell.length;
        clusters.push({
          id: cId, members: cell.slice(),
          cx, cz, cr: Math.sqrt(cx*cx + cz*cz),
          cAngle: Math.atan2(cz, cx),
          pairs, mersenne, stable, resonance: resonanceScore,
          strength: cell.length * 0.001 * (stable ? 3 : 1)
        });
        for (const idx of cell) disc.particles[idx].clusterId = cId;
      }
    }
    disc.clusters = clusters;

    // Recolor clustered particles
    for (const c of clusters) {
      for (const idx of c.members) {
        if (c.stable) { cols[idx*3] = 1; cols[idx*3+1] = 0.93; cols[idx*3+2] = 0.73; } // warm gold
        else { cols[idx*3] = 0.53; cols[idx*3+1] = 0.67; cols[idx*3+2] = 0.87; } // blue-grey
      }
    }
  }

  // ═══ AUDIO PERTURBATION FIELD ═══
  // Two rotating "arm" angles driven by bass and treble
  const armAngle1 = time * 0.0003 * (1 + smoothBands[0] * 3);
  const armAngle2 = time * 0.0004 * (1 + smoothBands[5] * 2) + Math.PI;

  // ═══ PER-PARTICLE PHYSICS ═══
  for (let i = 0; i < active; i++) {
    const p = disc.particles[i];
    if (!p) { _dd.scale.setScalar(0); _dd.updateMatrix(); disc.mesh.setMatrixAt(i, _dd.matrix); continue; }

    p.age++;
    const r = p.r;

    // NaN guard
    if (isNaN(r) || isNaN(p.vr) || isNaN(p.vTheta) || isNaN(p.angle) || r <= 0) {
      p.r = 10 + Math.random() * 15; p.angle = Math.random() * Math.PI * 2;
      p.vr = 0; const cO = Math.sqrt(Math.abs(GM) / (p.r*p.r*p.r) || 0.01);
      p.vTheta = cO * 0.9 * (Math.random() > 0.5 ? 1 : -1); p.age = 0;
      continue;
    }

    const r2 = r * r + softening;
    const r3 = r2 * r || 1;

    // ─── ANGULAR MOMENTUM ───
    let L = r * r * p.vTheta;
    L *= (1 - epsilon); // dissipation → spiral

    // ─── AUDIO ARM PERTURBATION ───
    if (reactivity > 0) {
      const bandE = smoothBands[p.band] * reactivity;
      // Arm 1: Coriolis torque (2-arm spiral driver)
      const dA1 = p.angle - armAngle1;
      L += Math.cos(dA1 * 2) * 0.08 * r * bandE;
      // Arm 2: cross tidal (radial perturbation)
      const dA2 = p.angle - armAngle2;
      p.vr += Math.cos(dA2 * 2) * 0.003 * bandE;
    }

    // ─── CLUSTER ATTRACTION ───
    if (disc.clusters.length > 0 && (p.clusterId == null || p.clusterId < 0)) {
      let nearDist = Infinity, nearC = null;
      const px = Math.cos(p.angle) * r;
      const pz = Math.sin(p.angle) * r;
      for (const c of disc.clusters) {
        const dx = px - c.cx, dz = pz - c.cz;
        const d2 = dx*dx + dz*dz;
        if (d2 < nearDist && d2 > 0.5) { nearDist = d2; nearC = c; }
      }
      if (nearC && nearDist < 400) {
        const dist = Math.sqrt(nearDist);
        const str = nearC.strength / dist;
        const dAng = nearC.cAngle - p.angle;
        L += Math.sin(dAng) * str * r * 0.5;
        const dr = nearC.cr - r;
        p.vr += dr * str * 0.02;
      }
    }

    // ─── RADIAL EQUATION OF MOTION ───
    // r̈ = -GM/r² + L²/r³
    const gravity = -GM / r2;
    const centrifugal = L * L / r3;
    const radialAccel = gravity + centrifugal;

    // Symplectic Euler (kick-drift)
    p.vr += radialAccel * dt;
    p.vr *= 0.9992; // minimal radial damping
    p.r += p.vr * dt;

    // θ̇ = L / r²  (Kepler's second law)
    if (p.r > 0.1) p.vTheta = L / (p.r * p.r);
    p.angle += p.vTheta * dt;

    // ─── CONSUMPTION / GENERATIVE BURP ───
    if (p.r < consumeR) {
      const wasStable = p.clusterId >= 0 && disc.clusters[p.clusterId] && disc.clusters[p.clusterId].stable;

      if (wasStable) {
        // ═══ GENERATIVE BURP: stable cluster → structured ejection ═══
        const cluster = disc.clusters[p.clusterId];
        const ejectAngle = p.angle + Math.PI;
        const ejectR = 15 + cluster.pairs * 3;
        p.r = ejectR;
        p.angle = ejectAngle;
        const circOm = Math.sqrt(GM / (p.r*p.r*p.r));
        p.vr = 0.04 + cluster.pairs * 0.01;
        p.vTheta = circOm * 0.9 * (p.vTheta >= 0 ? 1 : -1);
        p.age = 0; p.mobiusPhase = p.angle;
        disc.ejectQueue.push({ angle: ejectAngle, r: ejectR, spread: cluster.pairs * 2, pairs: cluster.pairs, mersenne: cluster.mersenne, ttl: 60 });
        disc.totalBurps++;
        cols[i*3] = 1; cols[i*3+1] = 0.84; cols[i*3+2] = 0; // flash gold
      } else {
        // Standard consumption → respawn
        const eR = 8 + Math.random() * 12;
        const cO = Math.sqrt(GM / (eR*eR*eR));
        p.r = eR;
        p.angle += Math.PI * (0.7 + Math.random() * 0.6);
        p.vr = 0.02 + Math.random() * 0.04;
        p.vTheta = cO * (0.8 + Math.random() * 0.4);
        if (Math.random() > 0.5) p.vTheta *= -1;
        p.age = 0; p.mobiusPhase = p.angle;
        cols[i*3] = 1; cols[i*3+1] = 1; cols[i*3+2] = 1; // flash white
      }

      // Eject queue → structure nearby respawns
      for (let eq = disc.ejectQueue.length - 1; eq >= 0; eq--) {
        const ej = disc.ejectQueue[eq];
        ej.ttl--;
        if (ej.ttl <= 0) { disc.ejectQueue.splice(eq, 1); continue; }
        const dAng = Math.abs(p.angle - ej.angle) % (Math.PI * 2);
        if (dAng < 0.5 || dAng > Math.PI * 2 - 0.5) {
          p.r = ej.r + (Math.random() - 0.5) * ej.spread;
          p.angle = ej.angle + (Math.random() - 0.5) * 0.3;
          const cOm = Math.sqrt(GM / (p.r*p.r*p.r));
          p.vTheta = cOm * 0.85 * (p.vTheta >= 0 ? 1 : -1);
          p.vr = 0.03;
          cols[i*3] = 1; cols[i*3+1] = 0.93; cols[i*3+2] = 0.73; // warm
        }
      }
      p.clusterId = -1;

    } else if (p.r > escapeR) {
      // Recapture
      p.r = 15 + Math.random() * 15;
      const cO = Math.sqrt(GM / (p.r*p.r*p.r));
      p.vr = -0.01;
      p.vTheta = cO * 0.7;
      p.age = 0;
    } else if (p.r < 1) {
      p.r = 1; p.vr = Math.abs(p.vr);
    }

    // ─── POSITIONING ───
    const flare = 1 + p.r * 0.02;
    const mobiusY = Math.sin(p.angle * 0.5 + p.mobiusPhase) * halfTwistH * flare;

    _dd.position.set(
      Math.cos(p.angle) * p.r,
      mobiusY,
      Math.sin(p.angle) * p.r
    );

    // Scale: base + twinkle + age fade-in + audio band energy
    const ageIn = Math.min(1, p.age / 20);
    const pulse = twinkle > 0 ? (0.6 + 0.4 * Math.abs(Math.cos(p.angle * 0.5 + time * 0.002 * (1 + p.band * 0.3)))) : 1;
    const bandBoost = 1 + smoothBands[p.band] * reactivity * 3;
    const s = sizeBase * pulse * ageIn * bandBoost;
    _dd.scale.setScalar(Math.max(0.05, s));

    // Color fade: white → band color over first 20 frames
    if (p.age > 0 && p.age < 20) {
      const t = p.age / 20;
      const bc = BAND_COLORS[p.band];
      cols[i*3]   = 1 + (bc[0] - 1) * t;
      cols[i*3+1] = 1 + (bc[1] - 1) * t;
      cols[i*3+2] = 1 + (bc[2] - 1) * t;
    }

    // Audio brightness modulation
    if (p.age >= 20) {
      const bc = BAND_COLORS[p.band];
      const bright = 0.4 + smoothBands[p.band] * reactivity * 1.5 + (p.clusterId >= 0 ? 0.3 : 0);
      cols[i*3]   = Math.min(1, bc[0] * bright);
      cols[i*3+1] = Math.min(1, bc[1] * bright);
      cols[i*3+2] = Math.min(1, bc[2] * bright);
    }

    _dd.updateMatrix();
    disc.mesh.setMatrixAt(i, _dd.matrix);
  }

  // Hide unused slots
  if (active < disc.max) {
    _dd.scale.setScalar(0); _dd.updateMatrix();
    for (let i = active; i < disc.max; i++) disc.mesh.setMatrixAt(i, _dd.matrix);
  }

  disc.mesh.instanceMatrix.needsUpdate = true;
  disc.mesh.instanceColor.needsUpdate = true;
}

// ╔══════════════════════════════════════════════════════════╗
// ║  MAIN LOOP                                               ║
// ╚══════════════════════════════════════════════════════════╝
let lastT = 0;

function animate(time) {
  requestAnimationFrame(animate);
  const dt = Math.min((time - lastT) / 16, 3);
  lastT = time;

  // Audio
  if (A.analyser && A.live) {
    A.analyser.getByteFrequencyData(A.freq);
    A.analyser.getByteTimeDomainData(A.time);
  } else if (!A.freq) {
    A.freq = new Uint8Array(1024);
  }

  // Idle shimmer
  if (!A.live) {
    for (let i = 0; i < 50; i++) A.freq[i] = Math.floor(Math.sin(time * 0.0008 + i * 0.4) * 10 + 14);
  }

  analyseBands();

  // ═══ BIRTH PARTICLES ═══
  const birthRate = V.g('sBirth') / 100;
  const audioBirthBoost = totalEnergy * V.g('sReact') * 0.01;
  const birthsPerFrame = Math.max(0, Math.floor((birthRate * 3 + audioBirthBoost * 8) * dt));

  for (let b = 0; b < birthsPerFrame; b++) birthParticle();

  // Flash on first real batch
  if (disc.count > 0 && disc.count < 20) {
    const flash = document.getElementById('birthFlash');
    flash.style.opacity = 0.15;
    setTimeout(() => flash.style.opacity = 0, 300);
  }

  // ═══ PHYSICS ═══
  physicsStep(time);

  // ═══ CORE VISUALS (audio-reactive) ═══
  const bass = smoothBands[0];
  const treble = smoothBands[5];

  // Event horizon breathes with bass
  const ehScale = 2.5 + bass * 6 + totalEnergy * 3;
  ehMesh.scale.setScalar(ehScale);
  ehMesh.rotation.y = time * 0.0002;
  ehMesh.rotation.z = time * 0.00015;
  ehMesh.material.opacity = 0.03 + totalEnergy * 0.12;

  // Photon sphere pulses
  const psScale = 1 + bass * 2;
  psMesh.scale.setScalar(psScale);
  psMesh.rotation.z = time * 0.0003;
  psMesh.material.opacity = 0.05 + totalEnergy * 0.25;
  psMesh.material.color.setHSL(0.08 + treble * 0.15, 0.8, 0.5 + bass * 0.3);

  // Glow ring
  const grScale = 1 + totalEnergy * 4;
  glowMesh.scale.setScalar(grScale);
  glowMesh.rotation.z = time * 0.0002;
  glowMesh.material.opacity = 0.02 + totalEnergy * 0.08;

  // Point light at center
  ptLight.intensity = 0.05 + totalEnergy * 3 + bass * 2;
  ptLight.color.setHSL(0.06 + totalEnergy * 0.12, 0.85, 0.4 + totalEnergy * 0.4);

  // ═══ HUD ═══
  const stableClusters = disc.clusters.filter(c => c.stable).length;
  document.getElementById('metric').textContent =
    `p:${disc.count}/${disc.max} · c:${disc.clusters.length}${stableClusters > 0 ? ' \u2605' + stableClusters : ''} · ` +
    `GM:${getGM().toFixed(1)} · E:${(totalEnergy*100).toFixed(0)}% · d:${cam.dist.toFixed(0)}`;

  document.getElementById('statsEl').innerHTML =
    `<b>particles</b> ${disc.count} · <b>clusters</b> ${disc.clusters.length} · ` +
    `<b>stable</b> ${stableClusters} · <b>burps</b> ${disc.totalBurps}`;

  renderer.render(scene, camera);
}

// ═══ INIT ═══
updateCam();
rebuildDisc();
requestAnimationFrame(animate);
</script>
</body>
</html>
